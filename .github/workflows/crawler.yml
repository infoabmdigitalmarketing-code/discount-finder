name: Discount Crawler

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt
          echo "✅ All packages installed!"

      - name: Verify packages
        run: |
          python -c "import requests; print('✅ requests OK')"
          python -c "import bs4; print('✅ beautifulsoup4 OK')"
          python -c "import fake_useragent; print('✅ fake_useragent OK')"
          python -c "from supabase import create_client; print('✅ supabase OK')"
          echo "✅ All imports working!"

      - name: Check Secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ SUPABASE_URL is missing!"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "❌ SUPABASE_SERVICE_KEY is missing!"
            exit 1
          fi
          echo "✅ Both secrets found!"
          echo "URL: ${SUPABASE_URL:0:30}..."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run Crawler
        run: |
          cd crawler
          python main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
